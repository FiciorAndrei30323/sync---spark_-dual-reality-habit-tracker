<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Google AI Studio App</title>
    <script>
      // Temporary patch to fix "Cannot set property fetch of #<Window> which has only a getter"
      try {
        const originalFetch = window.fetch;
        Object.defineProperty(window, 'fetch', {
          configurable: true,
          enumerable: true,
          get() {
            return originalFetch;
          },
          set(newFetch) {
            Object.defineProperty(window, 'fetch', {
              value: newFetch,
              configurable: true,
              enumerable: true,
              writable: true
            });
          }
        });
      } catch (err) {
        console.warn('Could not patch window.fetch:', err);
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
